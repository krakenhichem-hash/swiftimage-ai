<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftImage AI - Free Background Remover</title>
    <meta name="description" content="Remove backgrounds instantly with AI. Free, private, no upload.">
    <style>
        * { box-sizing: border-box; }
        body { background:#080810; color:#fff; font-family:Arial,sans-serif; margin:0; padding:0 15px; }
        header { padding:20px; text-align:center; }
        .hero { text-align:center; padding:40px 0; }
        .hero h1 { font-size:2.5rem; }
        .hero span { color:#8b5cf6; }
        .container { max-width:600px; margin:auto; }
        
        .upload-area { 
            display:block;
            border:2px dashed #333; 
            padding:40px 20px; 
            border-radius:20px; 
            background:#12121c; 
            text-align:center; 
            margin:20px 0; 
            cursor:pointer; 
            transition:0.3s;
        }
        .upload-area:active, .upload-area:hover { border-color:#8b5cf6; background:#1a1a2e; }
        .upload-area input[type="file"] { display:none; }
        
        button { 
            display:block; width:100%; margin:10px 0; background:#8b5cf6; color:white; 
            border:none; padding:16px; border-radius:14px; font-size:18px; cursor:pointer;
        }
        button:disabled { opacity:0.5; }
        .preview-row { display:flex; flex-direction:column; gap:20px; margin:20px 0; }
        .preview-row img, .preview-row canvas { max-width:100%; border-radius:12px; border:1px solid #333; touch-action:none; }
        #progress-bar { width:100%; height:8px; background:#222; border-radius:8px; margin:10px 0; display:none; }
        #progress-fill { width:0%; height:100%; background:#8b5cf6; border-radius:8px; }
        
        .brush-controls { display:none; margin:10px 0; text-align:center; }
        .brush-controls input[type="range"] { width:100%; margin:5px 0; }
        .btn-secondary { background:#333; display:inline-block; width:auto; padding:10px 20px; margin:5px; }
        footer { text-align:center; padding:30px; color:#888; }
        footer a { color:#8b5cf6; margin:0 10px; }
        
        @media (max-width:400px) {
            .hero h1 { font-size:2rem; }
        }
    </style>
</head>
<body>
<header><h2>SwiftImage AI</h2></header>
<section class="hero">
    <h1><span>Remove Backgrounds</span> Instantly</h1>
    <p>AI runs in your browser. 100% private, no upload.</p>
</section>

<div class="container">
    <label class="upload-area" id="uploadLabel">
        <p>📁 Tap to select an image</p>
        <input type="file" id="fileInput" accept="image/*">
    </label>

    <button id="removeBtn" disabled>🔮 Remove Background</button>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    
    <div class="preview-row" id="preview" style="display:none;">
        <div><strong>Original</strong><br><img id="originalImg" alt="Original"></div>
        <div>
            <strong>Result (brush to erase)</strong><br>
            <canvas id="resultCanvas" width="800" height="600"></canvas>
        </div>
    </div>
    
    <!-- أدوات الفرشاة (تظهر بعد إزالة الخلفية) -->
    <div class="brush-controls" id="brushControls">
        <button id="brushToggleBtn" class="btn-secondary">🖌️ Enable Brush Eraser</button>
        <div id="brushSettings" style="display:none;margin-top:5px;">
            <label>Brush Size: <span id="brushSizeValue">20</span>px</label>
            <input type="range" id="brushSize" min="5" max="80" value="20">
            <button id="undoBtn" class="btn-secondary">↩ Undo Last Stroke</button>
        </div>
    </div>
    
    <button id="downloadBtn" style="display:none;">⬇ Download PNG</button>
</div>

<footer>
    <p>
        <a href="/">Home</a> | 
        <a href="/privacy.html">Privacy Policy</a> | 
        <a href="/contact.html">Contact</a> | 
        <a href="/about.html">About</a>
    </p>
    <p>© 2026 SwiftImage AI</p>
</footer>

<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1/+esm';

// ---- DOM Elements ----
const fileInput = document.getElementById('fileInput');
const removeBtn = document.getElementById('removeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const originalImg = document.getElementById('originalImg');
const resultCanvas = document.getElementById('resultCanvas');
const preview = document.getElementById('preview');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const uploadLabel = document.getElementById('uploadLabel');
const brushControls = document.getElementById('brushControls');
const brushToggleBtn = document.getElementById('brushToggleBtn');
const brushSettings = document.getElementById('brushSettings');
const brushSizeInput = document.getElementById('brushSize');
const brushSizeValue = document.getElementById('brushSizeValue');
const undoBtn = document.getElementById('undoBtn');

// ---- State ----
let currentFile = null;
let pngBlob = null;
const MAX_SIZE = 800;
let resultBlob = null;         // نتيجة إزالة الخلفية
let brushActive = false;
let isDrawing = false;
let brushSize = 20;
let ctx = resultCanvas.getContext('2d');
let undoStack = [];             // لتخزين حالات canvas للتراجع

// ---- دالة تحويل أي صورة إلى PNG مصغر ----
function convertToPNG(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > MAX_SIZE || height > MAX_SIZE) {
                if (width > height) {
                    height = Math.round((height / width) * MAX_SIZE);
                    width = MAX_SIZE;
                } else {
                    width = Math.round((width / height) * MAX_SIZE);
                    height = MAX_SIZE;
                }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob((blob) => {
                if (blob) resolve(blob);
                else reject(new Error('Canvas toBlob failed'));
            }, 'image/png', 0.9);
        };
        img.onerror = () => reject(new Error('Failed to load image'));
        img.src = URL.createObjectURL(file);
    });
}

// ---- رفع الصورة ----
fileInput.addEventListener('change', async (e) => {
    if (e.target.files[0]) {
        resetAll();
        const file = e.target.files[0];
        currentFile = file;
        originalImg.src = URL.createObjectURL(file);
        preview.style.display = 'flex';
        removeBtn.disabled = false;
        uploadLabel.querySelector('p').innerText = file.name;
        try {
            pngBlob = await convertToPNG(file);
        } catch (err) {
            alert('Cannot process this image. Try another format.');
            removeBtn.disabled = true;
        }
    }
});

// دعم السحب والإفلات
uploadLabel.addEventListener('dragover', (e) => { e.preventDefault(); uploadLabel.style.borderColor = '#8b5cf6'; });
uploadLabel.addEventListener('dragleave', () => uploadLabel.style.borderColor = '#333');
uploadLabel.addEventListener('drop', async (e) => {
    e.preventDefault();
    uploadLabel.style.borderColor = '#333';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
        resetAll();
        currentFile = file;
        originalImg.src = URL.createObjectURL(file);
        preview.style.display = 'flex';
        removeBtn.disabled = false;
        uploadLabel.querySelector('p').innerText = file.name;
        try { pngBlob = await convertToPNG(file); }
        catch (err) { alert('Cannot process this image.'); removeBtn.disabled = true; }
    }
});

// ---- إزالة الخلفية ----
removeBtn.addEventListener('click', async () => {
    if (!pngBlob) return;
    removeBtn.disabled = true;
    progressBar.style.display = 'block';
    progressFill.style.width = '10%';
    try {
        const blob = await removeBackground(pngBlob, {
            progress: (key, current, total) => {
                progressFill.style.width = Math.min(Math.round((current/total)*100), 90) + '%';
            }
        });
        resultBlob = blob;
        // عرض النتيجة في canvas
        const img = new Image();
        img.onload = () => {
            resultCanvas.width = img.width;
            resultCanvas.height = img.height;
            ctx = resultCanvas.getContext('2d');
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            ctx.drawImage(img, 0, 0);
            brushControls.style.display = 'block';
            downloadBtn.style.display = 'block';
            saveUndoState(); // حفظ الحالة الأولى
        };
        img.src = URL.createObjectURL(blob);
        progressFill.style.width = '100%';
    } catch (err) {
        alert('Error: ' + err.message);
    } finally {
        removeBtn.disabled = false;
        setTimeout(() => { progressBar.style.display = 'none'; progressFill.style.width = '0%'; }, 1000);
    }
});

// ---- أدوات الفرشاة ----
brushToggleBtn.addEventListener('click', () => {
    brushActive = !brushActive;
    if (brushActive) {
        brushToggleBtn.textContent = '🖌️ Brush Active (tap to disable)';
        brushSettings.style.display = 'block';
        resultCanvas.style.cursor = 'crosshair';
    } else {
        brushToggleBtn.textContent = '🖌️ Enable Brush Eraser';
        brushSettings.style.display = 'none';
        resultCanvas.style.cursor = 'default';
    }
});

brushSizeInput.addEventListener('input', (e) => {
    brushSize = parseInt(e.target.value);
    brushSizeValue.textContent = brushSize;
});

// حفظ حالة canvas للتراجع
function saveUndoState() {
    undoStack.push(resultCanvas.toDataURL());
    // نحتفظ بحد أقصى 20 حالة لتوفير الذاكرة
    if (undoStack.length > 20) undoStack.shift();
}

undoBtn.addEventListener('click', () => {
    if (undoStack.length > 1) {
        undoStack.pop(); // إزالة الحالة الحالية
        const previousState = undoStack[undoStack.length - 1];
        const img = new Image();
        img.onload = () => {
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = previousState;
    }
});

// ---- أحداث الرسم بالفرشاة (يدعم الماوس واللمس) ----
function getPos(e) {
    const rect = resultCanvas.getBoundingClientRect();
    const scaleX = resultCanvas.width / rect.width;   // نسبة التحويل
    const scaleY = resultCanvas.height / rect.height;
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

function eraseAt(x, y) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out'; // يمحو البكسلات
    ctx.beginPath();
    ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function startDraw(e) {
    if (!brushActive) return;
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    eraseAt(pos.x, pos.y);
    saveUndoState(); // بداية كل ضربة جديدة تحفظ الحالة
}

function draw(e) {
    if (!isDrawing || !brushActive) return;
    e.preventDefault();
    const pos = getPos(e);
    eraseAt(pos.x, pos.y);
}

function endDraw(e) {
    if (!brushActive) return;
    isDrawing = false;
    saveUndoState(); // بعد انتهاء الضربة
}

// أحداث الماوس
resultCanvas.addEventListener('mousedown', startDraw);
resultCanvas.addEventListener('mousemove', draw);
resultCanvas.addEventListener('mouseup', endDraw);
resultCanvas.addEventListener('mouseleave', endDraw);

// أحداث اللمس (الجوال)
resultCanvas.addEventListener('touchstart', startDraw, { passive: false });
resultCanvas.addEventListener('touchmove', draw, { passive: false });
resultCanvas.addEventListener('touchend', endDraw);
resultCanvas.addEventListener('touchcancel', endDraw);

// ---- تحميل النتيجة النهائية (المعدلة بالفرشاة) ----
downloadBtn.addEventListener('click', () => {
    if (!resultCanvas) return;
    const url = resultCanvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = 'transparent.png';
    a.click();
});

// ---- إعادة تعيين كل شيء ----
function resetAll() {
    resultBlob = null;
    brushActive = false;
    brushToggleBtn.textContent = '🖌️ Enable Brush Eraser';
    brushSettings.style.display = 'none';
    brushControls.style.display = 'none';
    downloadBtn.style.display = 'none';
    undoStack = [];
    ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
}

// معالجة أخطاء تحميل المكتبة
window.addEventListener('error', (e) => {
    if (e.message && e.message.includes('Failed to fetch dynamically imported module')) {
        alert('Failed to load AI library. Check your connection and refresh.');
    }
});
</script>
</body>
</html>
