<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftImage AI - Free Background Remover</title>
    <meta name="description" content="Remove backgrounds instantly with AI. Free, private, no upload.">
    <style>
        * { box-sizing: border-box; }
        body { background:#080810; color:#fff; font-family:Arial,sans-serif; margin:0; padding:0 15px; }
        header { padding:20px; text-align:center; }
        .hero { text-align:center; padding:40px 0; }
        .hero h1 { font-size:2.5rem; }
        .hero span { color:#8b5cf6; }
        .container { max-width:600px; margin:auto; }

        /* صندوق الرفع */
        .upload-area {
            position: relative; /* لجعل input يملؤه */
            display: block;
            border: 2px dashed #333;
            padding: 40px 20px;
            border-radius: 20px;
            background: #12121c;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
            overflow: hidden; /* حتى لا يظهر input بالخارج */
        }
        .upload-area:active, .upload-area:hover { border-color:#8b5cf6; background:#1a1a2e; }

        /* إخفاء input بشكل متوافق مع كل الأجهزة */
        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        button {
            display: block; width: 100%; margin: 10px 0; background:#8b5cf6; color:white;
            border: none; padding: 16px; border-radius: 14px; font-size: 18px; cursor: pointer;
        }
        button:disabled { opacity: 0.5; }

        .preview-row { display: flex; flex-direction: column; gap: 20px; margin: 20px 0; }
        .preview-row img, .preview-row canvas { max-width: 100%; border-radius: 12px; border: 1px solid #333; }

        #resultCanvas {
            pointer-events: none;
            touch-action: pan-y;
        }
        #resultCanvas.brushing, #resultCanvas.lassoing {
            pointer-events: auto;
            touch-action: none;
        }

        .result-wrapper {
            display: inline-block;
            background-image:
                linear-gradient(45deg, #555 25%, transparent 25%),
                linear-gradient(-45deg, #555 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #555 75%),
                linear-gradient(-45deg, transparent 75%, #555 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 12px;
            padding: 2px;
        }
        .result-wrapper canvas { display: block; border-radius: 10px; }

        #progress-container { display: none; margin: 10px 0; }
        #progress-bar {
            width: 100%; height: 8px; background: #222; border-radius: 8px; overflow: hidden;
        }
        #progress-fill {
            width: 0%; height: 100%; background: #8b5cf6; border-radius: 8px; transition: width 0.3s ease;
        }
        #progress-text { text-align: center; font-size: 16px; color: #8b5cf6; margin-top: 5px; }

        .toolbox { display: none; margin: 10px 0; text-align: center; }
        .tool-btn {
            display: inline-block; width: auto; padding: 10px 18px; margin: 5px; border-radius: 12px;
            background: #333; color: #fff; cursor: pointer; border: none; font-size: 14px;
        }
        .tool-btn.active { background: #8b5cf6; }
        .tool-settings { display: none; margin-top: 5px; }
        .tool-settings input[type="range"] { width: 100%; margin: 5px 0; }
        .btn-secondary { background: #333; display: inline-block; width: auto; padding: 10px 20px; margin: 5px; border-radius: 12px; cursor: pointer; }
        footer { text-align: center; padding: 30px; color: #888; }
        footer a { color: #8b5cf6; margin: 0 10px; }

        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: #8b5cf6; color: #fff; padding: 14px 28px; border-radius: 30px;
            font-size: 16px; font-weight: bold; box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
            animation: slideDown 0.4s ease, fadeOut 0.4s 1.6s ease forwards;
            pointer-events: auto; white-space: nowrap;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        @media (max-width: 400px) {
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div id="toast-container"></div>

<header><h2>SwiftImage AI</h2></header>
<section class="hero">
    <h1><span>Remove Backgrounds</span> Instantly</h1>
    <p>AI runs in your browser. 100% private, no upload.</p>
</section>

<div class="container">
    <!-- ========== منطقة الرفع المُحسَّنة ========== -->
    <div class="upload-area" id="uploadArea">
        <p>📁 Tap to select an image</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <button id="removeBtn" disabled>🔮 Remove Background</button>

    <div id="progress-container">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="progress-text">Processing… 0%</div>
    </div>

    <div class="preview-row" id="preview" style="display:none;">
        <div><strong>Original</strong><br><img id="originalImg" alt="Original"></div>
        <div>
            <strong>Result (transparent background)</strong><br>
            <div class="result-wrapper">
                <canvas id="resultCanvas" width="800" height="600"></canvas>
            </div>
        </div>
    </div>

    <div class="toolbox" id="toolbox">
        <button id="brushToolBtn" class="tool-btn">🖌️ Brush</button>
        <button id="lassenToolBtn" class="tool-btn">✂️ Lasso</button>
        <div id="toolSettings" class="tool-settings">
            <label>Brush Size: <span id="brushSizeValue">20</span>px</label>
            <input type="range" id="brushSize" min="5" max="80" value="20">
        </div>
        <button id="deleteSelectionBtn" class="btn-secondary" style="display:none;">🗑️ Delete Selected Area</button>
        <button id="undoBtn" class="btn-secondary">↩ Undo</button>
    </div>

    <button id="downloadBtn" style="display:none;">⬇ Download PNG</button>
</div>

<footer>
    <p>
        <a href="/">Home</a> |
        <a href="/privacy.html">Privacy Policy</a> |
        <a href="/contact.html">Contact</a> |
        <a href="/about.html">About</a>
    </p>
    <p>© 2026 SwiftImage AI</p>
</footer>

<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1/+esm';

// ---- Toast ----
function showToast(msg) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
}

// ---- DOM ----
const fileInput = document.getElementById('fileInput');
const removeBtn = document.getElementById('removeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const originalImg = document.getElementById('originalImg');
const resultCanvas = document.getElementById('resultCanvas');
const preview = document.getElementById('preview');
const progressContainer = document.getElementById('progress-container');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const uploadArea = document.getElementById('uploadArea');
const toolbox = document.getElementById('toolbox');
const brushToolBtn = document.getElementById('brushToolBtn');
const lassenToolBtn = document.getElementById('lassenToolBtn');
const toolSettings = document.getElementById('toolSettings');
const brushSizeInput = document.getElementById('brushSize');
const brushSizeValue = document.getElementById('brushSizeValue');
const deleteSelectionBtn = document.getElementById('deleteSelectionBtn');
const undoBtn = document.getElementById('undoBtn');

let currentFile = null;
let pngBlob = null;
const MAX_SIZE = 1024;
let resultBlob = null;
let ctx = resultCanvas.getContext('2d');
let undoStack = [];

// ---- الأدوات ----
let activeTool = null;
let brushSize = 20;
let isDrawing = false;
let lassoPoints = [];
let lassoActive = false;
let lassoDrawing = false;

function getCanvasCoords(e) {
    const rect = resultCanvas.getBoundingClientRect();
    const scaleX = resultCanvas.width / rect.width;
    const scaleY = resultCanvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

// ---- إدارة الأدوات ----
function disableAllTools() {
    if (activeTool === 'brush') {
        resultCanvas.classList.remove('brushing');
    } else if (activeTool === 'lasso') {
        resultCanvas.classList.remove('lassoing');
        if (lassoPoints.length > 0) drawFinalLasso();
    }
    activeTool = null;
    brushToolBtn.classList.remove('active');
    lassenToolBtn.classList.remove('active');
    toolSettings.style.display = 'none';
    deleteSelectionBtn.style.display = 'none';
    removeAllToolListeners();
}

function enableBrush() {
    disableAllTools();
    activeTool = 'brush';
    brushToolBtn.classList.add('active');
    resultCanvas.classList.add('brushing');
    toolSettings.style.display = 'block';
    addBrushListeners();
}

function enableLasso() {
    disableAllTools();
    activeTool = 'lasso';
    lassenToolBtn.classList.add('active');
    resultCanvas.classList.add('lassoing');
    toolSettings.style.display = 'none';
    lassoPoints = [];
    lassoActive = false;
    lassoDrawing = false;
    deleteSelectionBtn.style.display = 'none';
    addLassoListeners();
}

function removeAllToolListeners() {
    removeBrushListeners();
    removeLassoListeners();
}

// === الفرشاة ===
function eraseAt(x, y) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function brushStart(e) {
    e.preventDefault();
    isDrawing = true;
    const p = getCanvasCoords(e);
    eraseAt(p.x, p.y);
    setTimeout(saveUndoState, 10);
}

function brushMove(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const p = getCanvasCoords(e);
    eraseAt(p.x, p.y);
}

function brushEnd() { isDrawing = false; }

function addBrushListeners() {
    resultCanvas.addEventListener('touchstart', brushStart, { passive: false });
    resultCanvas.addEventListener('touchmove', brushMove, { passive: false });
    resultCanvas.addEventListener('touchend', brushEnd);
    resultCanvas.addEventListener('touchcancel', brushEnd);
    resultCanvas.addEventListener('mousedown', brushStart);
    resultCanvas.addEventListener('mousemove', brushMove);
    resultCanvas.addEventListener('mouseup', brushEnd);
    resultCanvas.addEventListener('mouseleave', brushEnd);
}

function removeBrushListeners() {
    resultCanvas.removeEventListener('touchstart', brushStart);
    resultCanvas.removeEventListener('touchmove', brushMove);
    resultCanvas.removeEventListener('touchend', brushEnd);
    resultCanvas.removeEventListener('touchcancel', brushEnd);
    resultCanvas.removeEventListener('mousedown', brushStart);
    resultCanvas.removeEventListener('mousemove', brushMove);
    resultCanvas.removeEventListener('mouseup', brushEnd);
    resultCanvas.removeEventListener('mouseleave', brushEnd);
}

// === اللاسو ===
function lassoStart(e) {
    e.preventDefault();
    lassoDrawing = true;
    lassoPoints = [];
    lassoPoints.push(getCanvasCoords(e));
    lassoActive = true;
    deleteSelectionBtn.style.display = 'none';
}

function lassoMove(e) {
    if (!lassoDrawing) return;
    e.preventDefault();
    lassoPoints.push(getCanvasCoords(e));
    drawLassoPreview();
}

function lassoEnd() {
    if (!lassoDrawing) return;
    lassoDrawing = false;
    if (lassoPoints.length < 3) {
        lassoPoints = [];
        lassoActive = false;
        drawLassoPreview();
        return;
    }
    drawFinalLasso();
    deleteSelectionBtn.style.display = 'inline-block';
}

function drawLassoPreview() {
    restoreCurrentImage();
    if (lassoPoints.length < 2) return;
    ctx.save();
    ctx.strokeStyle = '#8b5cf6';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.beginPath();
    ctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
    for (let i = 1; i < lassoPoints.length; i++) ctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
    ctx.stroke();
    ctx.restore();
}

function drawFinalLasso() {
    restoreCurrentImage();
    if (lassoPoints.length < 3) return;
    ctx.save();
    ctx.strokeStyle = '#8b5cf6';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
    for (let i = 1; i < lassoPoints.length; i++) ctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
    lassoActive = true;
}

function restoreCurrentImage() {
    if (!resultBlob) return;
    const img = new Image();
    img.src = URL.createObjectURL(resultBlob);
    img.onload = () => {
        ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
        ctx.drawImage(img, 0, 0);
    };
}

function deleteLassoArea() {
    if (!lassoActive || lassoPoints.length < 3) return;
    saveUndoState();
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
    for (let i = 1; i < lassoPoints.length; i++) ctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    resultCanvas.toBlob(blob => { if (blob) resultBlob = blob; }, 'image/png');
    lassoPoints = [];
    lassoActive = false;
    deleteSelectionBtn.style.display = 'none';
    drawLassoPreview();
}

function addLassoListeners() {
    resultCanvas.addEventListener('touchstart', lassoStart, { passive: false });
    resultCanvas.addEventListener('touchmove', lassoMove, { passive: false });
    resultCanvas.addEventListener('touchend', lassoEnd);
    resultCanvas.addEventListener('touchcancel', lassoEnd);
    resultCanvas.addEventListener('mousedown', lassoStart);
    resultCanvas.addEventListener('mousemove', lassoMove);
    resultCanvas.addEventListener('mouseup', lassoEnd);
}

function removeLassoListeners() {
    resultCanvas.removeEventListener('touchstart', lassoStart);
    resultCanvas.removeEventListener('touchmove', lassoMove);
    resultCanvas.removeEventListener('touchend', lassoEnd);
    resultCanvas.removeEventListener('touchcancel', lassoEnd);
    resultCanvas.removeEventListener('mousedown', lassoStart);
    resultCanvas.removeEventListener('mousemove', lassoMove);
    resultCanvas.removeEventListener('mouseup', lassoEnd);
}

// ---- أزرار الأدوات ----
brushToolBtn.addEventListener('click', () => {
    if (activeTool === 'brush') disableAllTools();
    else enableBrush();
});

lassenToolBtn.addEventListener('click', () => {
    if (activeTool === 'lasso') disableAllTools();
    else enableLasso();
});

deleteSelectionBtn.addEventListener('click', deleteLassoArea);

// ---- تحويل الصورة ----
function convertToPNG(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            let w = img.width, h = img.height;
            if (w > MAX_SIZE || h > MAX_SIZE) {
                if (w > h) { h = Math.round((h / w) * MAX_SIZE); w = MAX_SIZE; }
                else { w = Math.round((w / h) * MAX_SIZE); h = MAX_SIZE; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('toBlob failed')), 'image/png', 1.0);
        };
        img.onerror = () => reject(new Error('Image load error'));
        img.src = URL.createObjectURL(file);
    });
}

// ---- رفع الصورة (الآن يعمل على كل الأجهزة) ----
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    resetAll();
    currentFile = file;
    originalImg.src = URL.createObjectURL(file);
    preview.style.display = 'flex';
    removeBtn.disabled = false;
    uploadArea.querySelector('p').innerText = file.name;
    try {
        pngBlob = await convertToPNG(file);
        showToast('✅ Image uploaded successfully!');
    } catch (err) {
        alert('Cannot process this image.');
        removeBtn.disabled = true;
    }
});

// ---- تقدم وهمي ----
function startFakeProgress() {
    progressContainer.style.display = 'block';
    progressFill.style.width = '0%';
    progressText.textContent = 'Processing… 0%';
    let percent = 0;
    const interval = setInterval(() => {
        if (percent < 90) {
            percent += 1;
            progressFill.style.width = percent + '%';
            progressText.textContent = 'Processing… ' + percent + '%';
        } else {
            progressFill.style.width = '90%';
            progressText.textContent = 'Processing… 90%';
        }
    }, 300);
    return {
        stop: () => clearInterval(interval),
        complete: () => {
            clearInterval(interval);
            progressFill.style.width = '100%';
            progressText.textContent = 'Done!';
        }
    };
}

// ---- إزالة الخلفية ----
removeBtn.addEventListener('click', async () => {
    if (!pngBlob) return;
    removeBtn.disabled = true;
    const fake = startFakeProgress();

    try {
        resultBlob = await removeBackground(pngBlob, { model: 'isnet_quint8' }).catch(() =>
            removeBackground(pngBlob, { model: 'medium' })
        );
        const img = new Image();
        img.onload = () => {
            resultCanvas.width = img.width;
            resultCanvas.height = img.height;
            ctx = resultCanvas.getContext('2d');
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            ctx.drawImage(img, 0, 0);
            toolbox.style.display = 'block';
            downloadBtn.style.display = 'block';
            disableAllTools();
            saveUndoState();
            fake.complete();
            showToast('🎉 Background removed! Use Brush or Lasso to refine.');
        };
        img.src = URL.createObjectURL(resultBlob);
    } catch (err) {
        alert('Error: ' + err.message);
        progressText.textContent = 'Error';
    } finally {
        removeBtn.disabled = false;
        setTimeout(() => { progressContainer.style.display = 'none'; }, 1500);
    }
});

// ---- Undo ----
function saveUndoState() {
    if (undoStack.length > 20) undoStack.shift();
    undoStack.push(resultCanvas.toDataURL());
}

undoBtn.addEventListener('click', () => {
    if (undoStack.length > 1) {
        undoStack.pop();
        const prev = undoStack[undoStack.length - 1];
        const img = new Image();
        img.onload = () => {
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            ctx.drawImage(img, 0, 0);
            resultCanvas.toBlob(blob => { if (blob) resultBlob = blob; }, 'image/png');
        };
        img.src = prev;
    }
});

    const a = document.createElement('a');
    a.href = resultCanvas.toDataURL('i
