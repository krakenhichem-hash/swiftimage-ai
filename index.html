<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftImage AI - Free Background Remover</title>
    <meta name="description" content="Remove backgrounds instantly with AI. Free, private, no upload.">
    <style>
        body { background:#080810; color:#fff; font-family:Arial; margin:0; line-height:1.6; }
        header { padding:20px; text-align:center; border-bottom:1px solid #222; }
        .hero { text-align:center; padding:60px 20px 30px; }
        .hero h1 { font-size:52px; }
        .hero span { color:#8b5cf6; }
        .container { max-width:1000px; margin:auto; padding:20px; }
        .upload-area { border:2px dashed #333; padding:60px; border-radius:20px; background:#12121c; cursor:pointer; margin-bottom:20px; text-align:center; }
        button { background:#8b5cf6; color:white; border:none; padding:14px 24px; border-radius:12px; margin:5px; cursor:pointer; }
        button:disabled { opacity:0.6; }
        .preview-row { display:flex; justify-content:center; gap:20px; margin:30px 0; }
        .preview-row img { max-width:300px; border-radius:12px; }
        #progress-bar { width:100%; height:10px; background:#222; border-radius:10px; margin:10px 0; display:none; }
        #progress-fill { width:0%; height:100%; background:#8b5cf6; border-radius:10px; }
        footer { text-align:center; padding:30px; color:#888; border-top:1px solid #222; margin-top:40px; }
        footer a { color:#8b5cf6; }
    </style>
</head>
<body>
<header><h2>SwiftImage AI</h2></header>
<section class="hero">
    <h1><span>Remove Backgrounds</span> Instantly</h1>
    <p>AI runs in your browser. 100% private, no upload.</p>
</section>
<div class="container">
    <div class="upload-area" id="dropZone">
        <p id="dropText">📁 Drop image here or click</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>
    <div style="text-align:center;">
        <button id="preloadBtn">⚡ Preload AI Model</button>
        <button id="removeBtn" disabled>🔮 Remove Background</button>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div class="preview-row" id="preview" style="display:none;">
        <div><h4>Original</h4><img id="originalImg" alt="Original"></div>
        <div><h4>Result</h4><img id="resultImg" alt="Result"></div>
    </div>
    <div style="text-align:center;">
        <button id="downloadBtn" style="display:none;">⬇ Download PNG</button>
    </div>
</div>
<footer>
    <a href="/privacy">Privacy Policy</a> | <a href="/contact">Contact</a> | <a href="/about">About</a>
    <p>© 2026 SwiftImage AI</p>
</footer>

<script type="module">
import { AutoModel, Tensor } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2';

const elements = {
    dropZone: document.getElementById('dropZone'),
    fileInput: document.getElementById('fileInput'),
    preloadBtn: document.getElementById('preloadBtn'),
    removeBtn: document.getElementById('removeBtn'),
    downloadBtn: document.getElementById('downloadBtn'),
    originalImg: document.getElementById('originalImg'),
    resultImg: document.getElementById('resultImg'),
    preview: document.getElementById('preview'),
    progressBar: document.getElementById('progress-bar'),
    progressFill: document.getElementById('progress-fill'),
    dropText: document.getElementById('dropText')
};

let model = null;
let currentFile = null;
let originalImageElement = null; // لتخزين الصورة الأصلية

// ---- رفع الصورة ----
elements.dropZone.addEventListener('click', () => elements.fileInput.click());
elements.dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    elements.dropZone.style.borderColor = '#8b5cf6';
});
elements.dropZone.addEventListener('dragleave', () => {
    elements.dropZone.style.borderColor = '#333';
});
elements.dropZone.addEventListener('drop', e => {
    e.preventDefault();
    elements.dropZone.style.borderColor = '#333';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
});
elements.fileInput.addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
    currentFile = file;
    const url = URL.createObjectURL(file);
    elements.originalImg.src = url;
    elements.resultImg.src = '';
    elements.preview.style.display = 'flex';
    elements.removeBtn.disabled = false;
    elements.downloadBtn.style.display = 'none';
    elements.dropText.innerText = file.name;

    // تحميل الصورة الأصلية كـ HTMLImageElement لاستخدامها لاحقاً
    const img = new Image();
    img.onload = () => { originalImageElement = img; };
    img.src = url;
}

// ---- تحميل النموذج ----
elements.preloadBtn.addEventListener('click', async () => {
    if (model) {
        alert('✅ Model already loaded!');
        return;
    }
    elements.preloadBtn.disabled = true;
    elements.preloadBtn.textContent = 'Loading AI model...';
    try {
        model = await AutoModel.from_pretrained('Xenova/modnet', {
            config: { model_type: 'custom' },
            quantized: true
        });
        elements.preloadBtn.textContent = '✅ Model Ready';
    } catch (err) {
        alert('Error loading model: ' + err.message);
        elements.preloadBtn.textContent = '⚡ Preload AI Model';
    } finally {
        elements.preloadBtn.disabled = false;
    }
});

// ---- دوال مساعدة ----
function loadImageFromFile(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
    });
}

// تغيير حجم الصورة إلى مضاعفات 32
function resizeToMultiplesOf32(img) {
    const MAX_SIZE = 1024; // حد أقصى لتجنب استهلاك الذاكرة
    let width = img.width;
    let height = img.height;

    // تصغير إذا كانت كبيرة جداً
    if (width > MAX_SIZE || height > MAX_SIZE) {
        const ratio = Math.min(MAX_SIZE / width, MAX_SIZE / height);
        width = Math.floor(width * ratio);
        height = Math.floor(height * ratio);
    }

    // التقريب لأقرب مضاعف لـ 32
    const newWidth = Math.floor(width / 32) * 32 || 32;
    const newHeight = Math.floor(height / 32) * 32 || 32;

    const canvas = document.createElement('canvas');
    canvas.width = newWidth;
    canvas.height = newHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, newWidth, newHeight);
    return canvas;
}

// تحويل canvas إلى Tensor بالشكل [1, 3, H, W]
function canvasToTensor(canvas) {
    const ctx = canvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const pixels = imageData.data;
    const width = canvas.width;
    const height = canvas.height;
    const size = width * height;
    const floatData = new Float32Array(3 * size);

    for (let i = 0; i < size; i++) {
        floatData[i] = pixels[i * 4] / 255.0;         // R
        floatData[size + i] = pixels[i * 4 + 1] / 255.0; // G
        floatData[2 * size + i] = pixels[i * 4 + 2] / 255.0; // B
    }
    return new Tensor('float32', floatData, [1, 3, height, width]);
}

// ---- إزالة الخلفية ----
elements.removeBtn.addEventListener('click', async () => {
    if (!model) {
        alert('Please preload the AI model first!');
        return;
    }
    if (!currentFile || !originalImageElement) {
        alert('Please upload an image first.');
        return;
    }

    elements.removeBtn.disabled = true;
    elements.preloadBtn.disabled = true;
    elements.progressBar.style.display = 'block';
    elements.progressFill.style.width = '10%';

    try {
        const origImg = originalImageElement;
        const origWidth = origImg.width;
        const origHeight = origImg.height;

        // 1. تغيير حجم الصورة إلى مضاعفات 32
        const resizedCanvas = resizeToMultiplesOf32(origImg);
        const inputWidth = resizedCanvas.width;
        const inputHeight = resizedCanvas.height;

        elements.progressFill.style.width = '30%';

        // 2. تحويل canvas إلى tensor
        const tensor = canvasToTensor(resizedCanvas);

        elements.progressFill.style.width = '50%';

        // 3. تشغيل النموذج
        const output = await model({ input: tensor });

        elements.progressFill.style.width = '80%';

        // 4. استخراج القناع (نتوقع [1, 1, inputHeight, inputWidth] أو [1, inputHeight, inputWidth])
        let maskData = output.output.data; // Float32Array
        const maskLength = maskData.length;
        const expectedLen = inputWidth * inputHeight;

        let mask;
        if (maskLength === expectedLen) {
            mask = maskData;
        } else if (maskLength === expectedLen * 4) {
            // ربما [1,4,H,W] نأخذ القناة الأولى
            mask = new Float32Array(expectedLen);
            for (let i = 0; i < expectedLen; i++) mask[i] = maskData[i * 4];
        } else {
            // نحاول إعادة تشكيل
            mask = maskData.slice(0, expectedLen);
        }

        // 5. تغيير حجم القناع ليطابق أبعاد الصورة الأصلية
        const maskCanvas = document.createElement('canvas');
        maskCanvas.width = inputWidth;
        maskCanvas.height = inputHeight;
        const maskCtx = maskCanvas.getContext('2d');
        const maskImageData = maskCtx.createImageData(inputWidth, inputHeight);
        for (let i = 0; i < expectedLen; i++) {
            const val = Math.round(mask[i] * 255);
            maskImageData.data[i * 4] = val;     // R
            maskImageData.data[i * 4 + 1] = val; // G
            maskImageData.data[i * 4 + 2] = val; // B
            maskImageData.data[i * 4 + 3] = 255; // A
        }
        maskCtx.putImageData(maskImageData, 0, 0);

        // تكبير/تصغير القناع إلى حجم الصورة الأصلية
        const scaledMaskCanvas = document.createElement('canvas');
        scaledMaskCanvas.width = origWidth;
        scaledMaskCanvas.height = origHeight;
        const scaledCtx = scaledMaskCanvas.getContext('2d');
        scaledCtx.drawImage(maskCanvas, 0, 0, origWidth, origHeight);
        const scaledMaskData = scaledCtx.getImageData(0, 0, origWidth, origHeight).data;

        // 6. تطبيق الشفافية على الصورة الأصلية
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = origWidth;
        finalCanvas.height = origHeight;
        const finalCtx = finalCanvas.getContext('2d');
        finalCtx.drawImage(origImg, 0, 0);
        const origImageData = finalCtx.getImageData(0, 0, origWidth, origHeight);

        for (let i = 0; i < origWidth * origHeight; i++) {
            // استخدام القناة الحمراء من القناع كمستوى الشفافية
            const alpha = scaledMaskData[i * 4];
            origImageData.data[i * 4 + 3] = alpha;
        }
        finalCtx.putImageData(origImageData, 0, 0);

        const resultUrl = finalCanvas.toDataURL('image/png');
        elements.resultImg.src = resultUrl;
        elements.downloadBtn.style.display = 'inline-block';
        elements.downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = resultUrl;
            a.download = 'transparent.png';
            a.click();
        };

        elements.progressFill.style.width = '100%';
    } catch (err) {
        alert('Error: ' + err.message);
        console.error(err);
    } finally {
        elements.removeBtn.disabled = false;
        elements.preloadBtn.disabled = false;
        setTimeout(() => {
            elements.progressBar.style.display = 'none';
            elements.progressFill.style.width = '0%';
        }, 1500);
    }
});
</script>
</body>
</html>
