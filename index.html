<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftImage AI - Free Background Remover</title>
    <meta name="description" content="Remove backgrounds instantly with AI. Free, private, no upload.">
    <style>
        body { background:#080810; color:#fff; font-family:Arial; margin:0; line-height:1.6; }
        header { padding:20px; text-align:center; border-bottom:1px solid #222; }
        .hero { text-align:center; padding:60px 20px 30px; }
        .hero h1 { font-size:7vw; } /* تكبير الخط نسبياً للجوال */
        .hero span { color:#8b5cf6; }
        .container { max-width:1000px; margin:auto; padding:20px; }
        .upload-area { border:2px dashed #333; padding:60px 20px; border-radius:20px; background:#12121c; cursor:pointer; margin-bottom:20px; text-align:center; }
        button { background:#8b5cf6; color:white; border:none; padding:14px 24px; border-radius:12px; margin:5px; cursor:pointer; font-size:16px; }
        button:disabled { opacity:0.6; }
        .preview-row { display:flex; justify-content:center; gap:20px; margin:30px 0; flex-wrap:wrap; }
        .preview-row img { max-width:100%; border-radius:12px; }
        #progress-bar { width:100%; height:10px; background:#222; border-radius:10px; margin:10px 0; display:none; }
        #progress-fill { width:0%; height:100%; background:#8b5cf6; border-radius:10px; }
        footer { text-align:center; padding:30px; color:#888; border-top:1px solid #222; margin-top:40px; }
        footer a { color:#8b5cf6; }
        @media (max-width:600px) {
            .hero h1 { font-size:10vw; }
            .upload-area { padding:30px 15px; }
        }
    </style>
</head>
<body>
<header><h2>SwiftImage AI</h2></header>
<section class="hero">
    <h1><span>Remove Backgrounds</span> Instantly</h1>
    <p>AI runs in your browser. 100% private, no upload.</p>
</section>
<div class="container">
    <div class="upload-area" id="dropZone">
        <p id="dropText">📁 Drop image here or click</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>
    <div style="text-align:center;">
        <!-- لا حاجة لزر preload بعد الآن -->
        <button id="removeBtn" disabled>🔮 Remove Background</button>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div class="preview-row" id="preview" style="display:none;">
        <div><h4>Original</h4><img id="originalImg" alt="Original"></div>
        <div><h4>Result</h4><img id="resultImg" alt="Result"></div>
    </div>
    <div style="text-align:center;">
        <button id="downloadBtn" style="display:none;">⬇ Download PNG</button>
    </div>
</div>
<footer>
    <a href="/privacy">Privacy Policy</a> | <a href="/contact">Contact</a> | <a href="/about">About</a>
    <p>© 2026 SwiftImage AI</p>
</footer>

<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.1/+esm';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const removeBtn = document.getElementById('removeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const originalImg = document.getElementById('originalImg');
const resultImg = document.getElementById('resultImg');
const preview = document.getElementById('preview');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const dropText = document.getElementById('dropText');

let currentFile = null;

// ---- رفع الصورة ----
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor='#8b5cf6'; });
dropZone.addEventListener('dragleave', () => dropZone.style.borderColor='#333');
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor='#333';
    const file = e.dataTransfer.files[0];
    if (file?.type?.startsWith('image/')) handleFile(file);
});
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
    currentFile = file;
    originalImg.src = URL.createObjectURL(file);
    resultImg.src = '';
    preview.style.display = 'flex';
    removeBtn.disabled = false;
    downloadBtn.style.display = 'none';
    dropText.innerText = file.name;
}

// ---- إزالة الخلفية (تعمل على PC و Mobile) ----
removeBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    removeBtn.disabled = true;
    progressBar.style.display = 'block';
    progressFill.style.width = '20%';

    try {
        const resultBlob = await removeBackground(currentFile, {
            progress: (key, current, total) => {
                const percent = Math.round((current / total) * 100);
                progressFill.style.width = Math.min(percent, 90) + '%';
            }
        });

        progressFill.style.width = '100%';
        const url = URL.createObjectURL(resultBlob);
        resultImg.src = url;
        downloadBtn.style.display = 'inline-block';
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = url;
            a.download = 'transparent.png';
            a.click();
        };
    } catch (err) {
        alert('Error: ' + err.message);
        console.error(err);
    } finally {
        removeBtn.disabled = false;
        setTimeout(() => {
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
        }, 1000);
    }
});
</script>
</body>
</html>
