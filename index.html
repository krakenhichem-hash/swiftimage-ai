<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftImage AI - Free Background Remover</title>
    <meta name="description" content="Remove backgrounds instantly with AI. Free, private, no upload.">
    <style>
        body { background:#080810; color:#fff; font-family:Arial; margin:0; line-height:1.6; }
        header { padding:20px; text-align:center; border-bottom:1px solid #222; }
        .hero { text-align:center; padding:60px 20px 30px; }
        .hero h1 { font-size:52px; }
        .hero span { color:#8b5cf6; }
        .container { max-width:1000px; margin:auto; padding:20px; }
        .upload-area { border:2px dashed #333; padding:60px; border-radius:20px; background:#12121c; cursor:pointer; margin-bottom:20px; }
        button { background:#8b5cf6; color:white; border:none; padding:14px 24px; border-radius:12px; margin:5px; cursor:pointer; }
        button:disabled { opacity:0.6; }
        .preview-row { display:flex; justify-content:center; gap:20px; margin:30px 0; }
        .preview-row img { max-width:300px; border-radius:12px; }
        #progress-bar { width:100%; height:10px; background:#222; border-radius:10px; margin:10px 0; display:none; }
        #progress-fill { width:0%; height:100%; background:#8b5cf6; border-radius:10px; }
        footer { text-align:center; padding:30px; color:#888; border-top:1px solid #222; }
        footer a { color:#8b5cf6; }
    </style>
</head>
<body>
<header><h2>SwiftImage AI</h2></header>
<section class="hero">
    <h1><span>Remove Backgrounds</span> Instantly</h1>
    <p>AI runs in your browser. 100% private, no upload.</p>
</section>
<div class="container">
    <div class="upload-area" id="dropZone">
        <p id="dropText">📁 Drop image here or click</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>
    <div class="btn-group">
        <button id="preloadBtn">⚡ Preload AI Model</button>
        <button id="removeBtn" disabled>🔮 Remove Background</button>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div class="preview-row" id="preview" style="display:none;">
        <div><h4>Original</h4><img id="originalImg"></div>
        <div><h4>Result</h4><img id="resultImg"></div>
    </div>
    <button id="downloadBtn" style="display:none;">⬇ Download PNG</button>
</div>
<footer>
    <a href="/privacy">Privacy</a> | <a href="/contact">Contact</a> | <a href="/about">About</a>
</footer>

<script type="module">
import { AutoModel, Tensor } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const preloadBtn = document.getElementById('preloadBtn');
const removeBtn = document.getElementById('removeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const originalImg = document.getElementById('originalImg');
const resultImg = document.getElementById('resultImg');
const preview = document.getElementById('preview');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const dropText = document.getElementById('dropText');

let model = null;
let currentFile = null;

// ---- رفع الصورة ----
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor='#8b5cf6'; });
dropZone.addEventListener('dragleave', () => dropZone.style.borderColor='#333');
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor='#333';
    const file = e.dataTransfer.files[0];
    if (file?.type?.startsWith('image/')) handleFile(file);
});
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
    currentFile = file;
    originalImg.src = URL.createObjectURL(file);
    resultImg.src = '';
    preview.style.display = 'flex';
    removeBtn.disabled = false;
    downloadBtn.style.display = 'none';
    dropText.innerText = file.name;
}

// ---- تحميل النموذج ----
preloadBtn.addEventListener('click', async () => {
    if (model) { alert('✅ Model already loaded'); return; }
    preloadBtn.disabled = true;
    preloadBtn.textContent = 'Loading...';
    try {
        model = await AutoModel.from_pretrained('Xenova/modnet', {
            config: { model_type: 'custom' },
            quantized: true
        });
        preloadBtn.textContent = '✅ Ready';
    } catch(err) {
        alert('Error: ' + err.message);
        preloadBtn.textContent = '⚡ Preload AI Model';
    } finally { preloadBtn.disabled = false; }
});

// ---- إزالة الخلفية ----
removeBtn.addEventListener('click', async () => {
    if (!model) { alert('Preload model first'); return; }
    if (!currentFile) return;

    removeBtn.disabled = true;
    progressBar.style.display = 'block';
    progressFill.style.width = '10%';

    try {
        // تحويل الصورة إلى Image element للحصول على الأبعاد
        const img = await loadImage(currentFile);
        const width = img.width;
        const height = img.height;

        // تحويل الصورة إلى tensor مناسب [1,3,H,W] و type float32
        const tensor = imageToTensor(img);

        progressFill.style.width = '50%';

        // تشغيل النموذج – يجب تمرير tensor باسم 'input'
        const { output } = await model({ input: tensor });

        progressFill.style.width = '80%';

        // output قناع [1,1,H,W] أو [1,H,W]، نستخرج alpha mask
        const maskData = output.data; // Float32Array
        const maskLength = maskData.length;
        const expectedLen = width * height;
        // قد يكون القناع (1,1,H,W) مضغوطًا، نأخذ القيم
        let mask;
        if (maskLength === expectedLen) {
            mask = maskData;
        } else if (maskLength === expectedLen * 4) {
            // ربما كان (1,4,H,W) نأخذ القناة الأولى
            mask = new Float32Array(expectedLen);
            for (let i = 0; i < expectedLen; i++) mask[i] = maskData[i * 4];
        } else {
            // افتراض أن القناع هو (1,1,H,W) لكن length قد يكون H*W (صحيح)
            mask = maskData;
        }

        // رسم الصورة الأصلية على canvas
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        // تطبيق الشفافية
        const imageData = ctx.getImageData(0, 0, width, height);
        for (let i = 0; i < expectedLen; i++) {
            // MODNet يخرج 1 للخلفية و0 للأمامية (أو العكس حسب الإصدار)
            // القناع الذي نحصل عليه غالباً 1 = foreground, 0 = background
            // إذا ظهرت الخلفية بيضاء والعكس، نعكس القيمة
            const alpha = Math.round(mask[i] * 255);
            // للتأكد: جرب alpha = 255 - alpha لو كان المقلوب
            imageData.data[i * 4 + 3] = alpha;
        }
        ctx.putImageData(imageData, 0, 0);

        const resultUrl = canvas.toDataURL('image/png');
        resultImg.src = resultUrl;
        downloadBtn.style.display = 'inline-block';
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = resultUrl;
            a.download = 'transparent.png';
            a.click();
        };

        progressFill.style.width = '100%';
    } catch(err) {
        alert('Error: ' + err.message);
        console.error(err);
    } finally {
        removeBtn.disabled = false;
        setTimeout(() => { progressBar.style.display = 'none'; progressFill.style.width = '0%'; }, 1000);
    }
});

// ---- دوال مساعدة ----
function loadImage(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
    });
}

function imageToTensor(img) {
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const imageData = ctx.getImageData(0, 0, img.width, img.height);
    const pixels = imageData.data; // Uint8ClampedArray RGBA
    const size = img.width * img.height;
    const floatData = new Float32Array(3 * size);

    // تحويل إلى RGB وتقسيم على 255
    for (let i = 0; i < size; i++) {
        floatData[i] = pixels[i * 4] / 255.0;
        floatData[size + i] = pixels[i * 4 + 1] / 255.0;
        floatData[2 * size + i] = pixels[i * 4 + 2] / 255.0;
    }
    return new Tensor('float32', floatData, [1, 3, img.height, img.width]);
}
</script>
</body>
</html>
