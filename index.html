<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1/+esm';

// ---- Toast ----
function showToast(msg) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
}

// ---- DOM ----
const fileInput = document.getElementById('fileInput');
const removeBtn = document.getElementById('removeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const originalImg = document.getElementById('originalImg');
const resultCanvas = document.getElementById('resultCanvas');
const preview = document.getElementById('preview');
const progressContainer = document.getElementById('progress-container');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const toolbox = document.getElementById('toolbox');
const brushToolBtn = document.getElementById('brushToolBtn');
const lassenToolBtn = document.getElementById('lassenToolBtn');
const toolSettings = document.getElementById('toolSettings');
const brushSizeInput = document.getElementById('brushSize');
const brushSizeValue = document.getElementById('brushSizeValue');
const deleteSelectionBtn = document.getElementById('deleteSelectionBtn');
const undoBtn = document.getElementById('undoBtn');

// ---- الحالة العامة ----
let currentFile = null;
let resultBlob = null;
let ctx = resultCanvas.getContext('2d');
let undoStack = [];

// ============== مدير الأدوات (Tool Manager) ==============
class ToolManager {
    constructor() {
        this.activeTool = null;
        this.tools = {};
        this.initTools();
    }

    initTools() {
        // تسجيل الأدوات الموجودة
        this.registerTool('brush', new BrushTool());
        this.registerTool('lasso', new LassenTool());
    }

    registerTool(name, toolInstance) {
        this.tools[name] = toolInstance;
    }

    activateTool(name) {
        if (this.activeTool === name) {
            // إذا ضغط على نفس الأداة، نوقفها
            this.deactivateAll();
            return;
        }
        this.deactivateAll();
        if (this.tools[name]) {
            this.tools[name].activate();
            this.activeTool = name;
        }
    }

    deactivateAll() {
        if (this.activeTool && this.tools[this.activeTool]) {
            this.tools[this.activeTool].deactivate();
        }
        this.activeTool = null;
        // إخفاء إعدادات الفرشاة وزر حذف اللاسو
        toolSettings.style.display = 'none';
        deleteSelectionBtn.style.display = 'none';
        // إزالة الكلاس النشط من الأزرار
        brushToolBtn.classList.remove('active');
        lassenToolBtn.classList.remove('active');
    }

    handleCanvasEvent(type, e) {
        if (this.activeTool && this.tools[this.activeTool]) {
            this.tools[this.activeTool].handleEvent(type, e);
        }
    }
}

// ============== أداة الفرشاة ==============
class BrushTool {
    constructor() {
        this.brushSize = 20;
        this.isDrawing = false;
        this.boundStart = this.start.bind(this);
        this.boundMove = this.move.bind(this);
        this.boundEnd = this.end.bind(this);
    }

    activate() {
        brushToolBtn.classList.add('active');
        toolSettings.style.display = 'block';
        resultCanvas.classList.add('brushing');
        resultCanvas.addEventListener('touchstart', this.boundStart, { passive: false });
        resultCanvas.addEventListener('touchmove', this.boundMove, { passive: false });
        resultCanvas.addEventListener('touchend', this.boundEnd);
        resultCanvas.addEventListener('touchcancel', this.boundEnd);
        resultCanvas.addEventListener('mousedown', this.boundStart);
        resultCanvas.addEventListener('mousemove', this.boundMove);
        resultCanvas.addEventListener('mouseup', this.boundEnd);
        resultCanvas.addEventListener('mouseleave', this.boundEnd);
    }

    deactivate() {
        resultCanvas.classList.remove('brushing');
        resultCanvas.removeEventListener('touchstart', this.boundStart);
        resultCanvas.removeEventListener('touchmove', this.boundMove);
        resultCanvas.removeEventListener('touchend', this.boundEnd);
        resultCanvas.removeEventListener('touchcancel', this.boundEnd);
        resultCanvas.removeEventListener('mousedown', this.boundStart);
        resultCanvas.removeEventListener('mousemove', this.boundMove);
        resultCanvas.removeEventListener('mouseup', this.boundEnd);
        resultCanvas.removeEventListener('mouseleave', this.boundEnd);
        this.isDrawing = false;
    }

    start(e) {
        e.preventDefault();
        this.isDrawing = true;
        const p = getCanvasCoords(e);
        this.eraseAt(p.x, p.y);
        setTimeout(saveUndoState, 10);
    }

    move(e) {
        if (!this.isDrawing) return;
        e.preventDefault();
        const p = getCanvasCoords(e);
        this.eraseAt(p.x, p.y);
    }

    end() {
        this.isDrawing = false;
    }

    eraseAt(x, y) {
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, this.brushSize / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    setSize(size) {
        this.brushSize = size;
    }

    handleEvent(type, e) {
        // يستخدمها المدير إذا لزم الأمر
    }
}

// ============== أداة اللاسو ==============
class LassenTool {
    constructor() {
        this.points = [];
        this.isActive = false;
        this.isDrawing = false;
        this.boundStart = this.start.bind(this);
        this.boundMove = this.move.bind(this);
        this.boundEnd = this.end.bind(this);
    }

    activate() {
        lassenToolBtn.classList.add('active');
        resultCanvas.classList.add('lassoing');
        resultCanvas.addEventListener('touchstart', this.boundStart, { passive: false });
        resultCanvas.addEventListener('touchmove', this.boundMove, { passive: false });
        resultCanvas.addEventListener('touchend', this.boundEnd);
        resultCanvas.addEventListener('touchcancel', this.boundEnd);
        resultCanvas.addEventListener('mousedown', this.boundStart);
        resultCanvas.addEventListener('mousemove', this.boundMove);
        resultCanvas.addEventListener('mouseup', this.boundEnd);
    }

    deactivate() {
        resultCanvas.classList.remove('lassoing');
        resultCanvas.removeEventListener('touchstart', this.boundStart);
        resultCanvas.removeEventListener('touchmove', this.boundMove);
        resultCanvas.removeEventListener('touchend', this.boundEnd);
        resultCanvas.removeEventListener('touchcancel', this.boundEnd);
        resultCanvas.removeEventListener('mousedown', this.boundStart);
        resultCanvas.removeEventListener('mousemove', this.boundMove);
        resultCanvas.removeEventListener('mouseup', this.boundEnd);
        // إغلاق أي تحديد مفتوح
        if (this.points.length > 0) {
            this.drawFinal();
        }
        this.points = [];
        this.isActive = false;
        this.isDrawing = false;
        deleteSelectionBtn.style.display = 'none';
    }

    start(e) {
        e.preventDefault();
        this.isDrawing = true;
        this.points = [];
        this.points.push(getCanvasCoords(e));
        this.isActive = true;
        deleteSelectionBtn.style.display = 'none';
    }

    move(e) {
        if (!this.isDrawing) return;
        e.preventDefault();
        this.points.push(getCanvasCoords(e));
        this.drawPreview();
    }

    end() {
        if (!this.isDrawing) return;
        this.isDrawing = false;
        if (this.points.length < 3) {
            this.points = [];
            this.isActive = false;
            restoreCurrentImage();
            return;
        }
        this.drawFinal();
        deleteSelectionBtn.style.display = 'inline-block';
    }

    drawPreview() {
        restoreCurrentImage();
        if (this.points.length < 2) return;
        ctx.save();
        ctx.strokeStyle = '#8b5cf6';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 3]);
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);
        for (let i = 1; i < this.points.length; i++) {
            ctx.lineTo(this.points[i].x, this.points[i].y);
        }
        ctx.stroke();
        ctx.restore();
    }

    drawFinal() {
        restoreCurrentImage();
        if (this.points.length < 3) return;
        ctx.save();
        ctx.strokeStyle = '#8b5cf6';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);
        for (let i = 1; i < this.points.length; i++) {
            ctx.lineTo(this.points[i].x, this.points[i].y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
        this.isActive = true;
    }

    deleteSelectedArea() {
        if (!this.isActive || this.points.length < 3) return;
        saveUndoState();
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);
        for (let i = 1; i < this.points.length; i++) {
            ctx.lineTo(this.points[i].x, this.points[i].y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        resultCanvas.toBlob(blob => { if (blob) resultBlob = blob; }, 'image/png');
        this.points = [];
        this.isActive = false;
        deleteSelectionBtn.style.display = 'none';
        restoreCurrentImage();
    }

    handleEvent(type, e) {}
}

// ---- دوال مساعدة عامة ----
function getCanvasCoords(e) {
    const rect = resultCanvas.getBoundingClientRect();
    const scaleX = resultCanvas.width / rect.width;
    const scaleY = resultCanvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function restoreCurrentImage() {
    if (!resultBlob) return;
    const img = new Image();
    img.src = URL.createObjectURL(resultBlob);
    img.onload = () => {
        ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
        ctx.drawImage(img, 0, 0);
    };
}

// ---- إنشاء مدير الأدوات ----
const toolManager = new ToolManager();

// ---- أزرار الأدوات ----
brushToolBtn.addEventListener('click', () => {
    toolManager.activateTool('brush');
});

lassenToolBtn.addEventListener('click', () => {

deleteSelectionBtn.addEventListener('click', () => {

    }
});

// ---- تقدم وهمي ----
function startFakeProgress() {
    progressContainer.style.display = 'block';
    progressFill.style.width = '0%';
    progressText.textContent = 'Processing… 0%';
    let percent = 0;
    const interval = setInterval(() => {
        if (percent < 90) {
            percent += 1;
            progressFill.style.width = percent + '%';
            progressText.textContent = 'Processing… ' + percent + '%';
        } else {
            progressFill.style.width = '90%';
            progressText.textContent = 'Processing… 90%';
        }
    }, 300);
    return {
        stop: () => clearInterval(interval),
        complete: () => {
            clearInterval(interval);
            progressFill.style.width = '100%';
            progressText.textContent = 'Done!';
        }
    };
}

// ---- معالجة الصورة ----
async function safePreprocessImage(file) {
    try {
        return await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const MAX_DIM = 1024;
                let width = img.width, height = img.height;
                if (width > MAX_DIM || height > MAX_DIM) {
                    const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
                    width = Math.round(width * ratio);
                    height = Math.round(height * ratio);
                }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                canvas.toBlob(blob => {
                    if (blob) { URL.revokeObjectURL(img.src); resolve(blob); }
                    else reject(new Error('Canvas toBlob failed'));
                }, 'image/png', 1.0);
            };
            img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('Image load error')); };
            img.src = URL.createObjectURL(file);
        });
    } catch (e) {
        console.warn('Preprocessing failed, using original file:', e);
        showToast('⚡ Using original image format...');
        return file;
    }
}

// ---- إزالة الخلفية ----
removeBtn.addEventListener('click', async () => {
    if (!currentFile
