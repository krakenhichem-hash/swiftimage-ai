<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftImage AI - Free Background Remover</title>
    <meta name="description" content="Remove backgrounds instantly with AI. Free, private, no upload.">
    <style>
        * { box-sizing: border-box; }
        body { background:#080810; color:#fff; font-family:Arial,sans-serif; margin:0; padding:0 15px; }
        header { padding:20px; text-align:center; }
        .hero { text-align:center; padding:40px 0; }
        .hero h1 { font-size:2.5rem; }
        .hero span { color:#8b5cf6; }
        .container { max-width:600px; margin:auto; }
        
        /* تنسيق منطقة الرفع باستخدام label */
        .upload-area { 
            display:block;
            border:2px dashed #333; 
            padding:40px 20px; 
            border-radius:20px; 
            background:#12121c; 
            text-align:center; 
            margin:20px 0; 
            cursor:pointer; 
            transition:0.3s;
        }
        .upload-area:active, .upload-area:hover { border-color:#8b5cf6; background:#1a1a2e; }
        .upload-area input[type="file"] { display:none; }
        
        button { 
            display:block; width:100%; margin:10px 0; background:#8b5cf6; color:white; 
            border:none; padding:16px; border-radius:14px; font-size:18px; cursor:pointer;
        }
        button:disabled { opacity:0.5; }
        .preview-row { display:flex; flex-direction:column; gap:20px; margin:20px 0; }
        .preview-row img { max-width:100%; border-radius:12px; border:1px solid #333; }
        #progress-bar { width:100%; height:8px; background:#222; border-radius:8px; margin:10px 0; display:none; }
        #progress-fill { width:0%; height:100%; background:#8b5cf6; border-radius:8px; }
        footer { text-align:center; padding:30px; color:#888; }
        footer a { color:#8b5cf6; margin:0 10px; }
        
        /* تحسينات للشاشات الصغيرة */
        @media (max-width:400px) {
            .hero h1 { font-size:2rem; }
        }
    </style>
</head>
<body>
<header><h2>SwiftImage AI</h2></header>
<section class="hero">
    <h1><span>Remove Backgrounds</span> Instantly</h1>
    <p>AI runs in your browser. 100% private, no upload.</p>
</section>

<div class="container">
    <!-- منطقة الرفع باستخدام label (تعمل على كل الأجهزة) -->
    <label class="upload-area" id="uploadLabel">
        <p>📁 Tap to select an image</p>
        <input type="file" id="fileInput" accept="image/*">
    </label>

    <button id="removeBtn" disabled>🔮 Remove Background</button>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    
    <div class="preview-row" id="preview" style="display:none;">
        <div><strong>Original</strong><br><img id="originalImg" alt="Original"></div>
        <div><strong>Result</strong><br><img id="resultImg" alt="Result"></div>
    </div>
    <button id="downloadBtn" style="display:none;">⬇ Download PNG</button>
</div>

<footer>
    <p>
        <a href="/">Home</a> | 
        <a href="/privacy.html">Privacy Policy</a> | 
        <a href="/contact.html">Contact</a> | 
        <a href="/about.html">About</a>
    </p>
    <p>© 2026 SwiftImage AI</p>
</footer>

<script type="module">
// استيراد المكتبة (إصدار مستقر)
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1/+esm';

// العناصر
const fileInput = document.getElementById('fileInput');
const removeBtn = document.getElementById('removeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const originalImg = document.getElementById('originalImg');
const resultImg = document.getElementById('resultImg');
const preview = document.getElementById('preview');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const uploadLabel = document.getElementById('uploadLabel');

let currentFile = null;

// ---- رفع الصورة (الآن label تقوم بكل شيء تلقائياً) ----
fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
});

// دعم السحب والإفلات للكمبيوتر (اختياري)
uploadLabel.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadLabel.style.borderColor = '#8b5cf6';
});
uploadLabel.addEventListener('dragleave', () => {
    uploadLabel.style.borderColor = '#333';
});
uploadLabel.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadLabel.style.borderColor = '#333';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
});

function handleFile(file) {
    currentFile = file;
    originalImg.src = URL.createObjectURL(file);
    resultImg.src = '';
    preview.style.display = 'block';
    removeBtn.disabled = false;
    downloadBtn.style.display = 'none';
    uploadLabel.querySelector('p').innerText = file.name; // تحديث النص
}

// ---- إزالة الخلفية ----
removeBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    removeBtn.disabled = true;
    progressBar.style.display = 'block';
    progressFill.style.width = '10%';

    try {
        const resultBlob = await removeBackground(currentFile, {
            progress: (key, current, total) => {
                const percent = Math.round((current / total) * 100);
                progressFill.style.width = Math.min(percent, 90) + '%';
            }
        });

        progressFill.style.width = '100%';
        const url = URL.createObjectURL(resultBlob);
        resultImg.src = url;
        downloadBtn.style.display = 'block';
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = url;
            a.download = 'transparent.png';
            a.click();
        };
    } catch (err) {
        alert('Error removing background: ' + err.message);
        console.error(err);
    } finally {
        removeBtn.disabled = false;
        setTimeout(() => {
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
        }, 1000);
    }
});

// تنبيه عند فشل تحميل المكتبة
window.addEventListener('error', (e) => {
    if (e.message && e.message.includes('Failed to fetch dynamically imported module')) {
        alert('Failed to load the AI library. Please check your connection and refresh.');
    }
});
</script>
</body>
</html>
