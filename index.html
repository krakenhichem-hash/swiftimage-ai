<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftImage AI - Free Background Remover</title>
    <meta name="description" content="Remove backgrounds instantly with AI. Free, private, no upload.">
    <style>
        * { box-sizing: border-box; }
        body { background:#080810; color:#fff; font-family:Arial,sans-serif; margin:0; padding:0 15px; }
        header { padding:20px; text-align:center; }
        .hero { text-align:center; padding:40px 0; }
        .hero h1 { font-size:2.5rem; }
        .hero span { color:#8b5cf6; }
        .container { max-width:600px; margin:auto; }

        .upload-area {
            display:block;
            border:2px dashed #333;
            padding:40px 20px;
            border-radius:20px;
            background:#12121c;
            text-align:center;
            margin:20px 0;
            cursor:pointer;
            transition:0.3s;
        }
        .upload-area:active, .upload-area:hover { border-color:#8b5cf6; background:#1a1a2e; }
        .upload-area input[type="file"] { display:none; }

        button {
            display:block; width:100%; margin:10px 0; background:#8b5cf6; color:white;
            border:none; padding:16px; border-radius:14px; font-size:18px; cursor:pointer;
        }
        button:disabled { opacity:0.5; }

        .preview-row { display:flex; flex-direction:column; gap:20px; margin:20px 0; }
        .preview-row img, .preview-row canvas { max-width:100%; border-radius:12px; border:1px solid #333; }

        #resultCanvas {
            pointer-events: none;
            touch-action: pan-y;
        }
        #resultCanvas.brushing {
            pointer-events: auto;
            touch-action: none;
        }

        .result-wrapper {
            display: inline-block;
            background-image:
                linear-gradient(45deg, #555 25%, transparent 25%),
                linear-gradient(-45deg, #555 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #555 75%),
                linear-gradient(-45deg, transparent 75%, #555 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius: 12px;
            padding: 2px;
        }
        .result-wrapper canvas { display: block; border-radius: 10px; }

        #progress-container { display:none; margin:10px 0; }
        #progress-bar {
            width:100%; height:8px; background:#222; border-radius:8px; overflow:hidden;
        }
        #progress-fill {
            width:0%; height:100%; background:#8b5cf6; border-radius:8px; transition: width 0.3s ease;
        }
        #progress-text { text-align:center; font-size:16px; color:#8b5cf6; margin-top:5px; }

        .brush-controls { display:none; margin:10px 0; text-align:center; }
        .brush-controls input[type="range"] { width:100%; margin:5px 0; }
        .btn-secondary { background:#333; display:inline-block; width:auto; padding:10px 20px; margin:5px; border-radius:12px; cursor:pointer; }
        footer { text-align:center; padding:30px; color:#888; }
        footer a { color:#8b5cf6; margin:0 10px; }

        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: #8b5cf6;
            color: #fff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
            animation: slideDown 0.4s ease, fadeOut 0.4s 1.6s ease forwards;
            pointer-events: auto;
            white-space: nowrap;
        }
        @keyframes slideDown {
            from { opacity:0; transform:translateY(-20px); }
            to { opacity:1; transform:translateY(0); }
        }
        @keyframes fadeOut {
            to { opacity:0; transform:translateY(-10px); }
        }

        @media (max-width:400px) {
            .hero h1 { font-size:2rem; }
        }
    </style>
</head>
<body>
<div id="toast-container"></div>

<header><h2>SwiftImage AI</h2></header>
<section class="hero">
    <h1><span>Remove Backgrounds</span> Instantly</h1>
    <p>AI runs in your browser. 100% private, no upload.</p>
</section>

<div class="container">
    <label class="upload-area" id="uploadLabel">
        <p>📁 Tap to select an image</p>
        <input type="file" id="fileInput" accept="image/*">
    </label>

    <button id="removeBtn" disabled>🔮 Remove Background</button>

    <div id="progress-container">
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <div id="progress-text">Processing… 0%</div>
    </div>

    <div class="preview-row" id="preview" style="display:none;">
        <div><strong>Original</strong><br><img id="originalImg" alt="Original"></div>
        <div>
            <strong>Result (transparent background)</strong><br>
            <div class="result-wrapper">
                <canvas id="resultCanvas" width="800" height="600"></canvas>
            </div>
        </div>
    </div>

    <div class="brush-controls" id="brushControls">
        <button id="brushToggleBtn" class="btn-secondary">🖌️ Enable Brush Eraser</button>
        <div id="brushSettings" style="display:none;margin-top:5px;">
            <label>Brush Size: <span id="brushSizeValue">20</span>px</label>
            <input type="range" id="brushSize" min="5" max="80" value="20">
            <button id="undoBtn" class="btn-secondary">↩ Undo Last Stroke</button>
        </div>
    </div>

    <button id="downloadBtn" style="display:none;">⬇ Download PNG</button>
</div>

<footer>
    <p>
        <a href="/">Home</a> |
        <a href="/privacy.html">Privacy Policy</a> |
        <a href="/contact.html">Contact</a> |
        <a href="/about.html">About</a>
    </p>
    <p>© 2026 SwiftImage AI</p>
</footer>

<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1/+esm';

// ---- Toast ----
function showToast(msg) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
}

// ---- DOM ----
const fileInput = document.getElementById('fileInput');
const removeBtn = document.getElementById('removeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const originalImg = document.getElementById('originalImg');
const resultCanvas = document.getElementById('resultCanvas');
const preview = document.getElementById('preview');
const progressContainer = document.getElementById('progress-container');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const uploadLabel = document.getElementById('uploadLabel');
const brushControls = document.getElementById('brushControls');
const brushToggleBtn = document.getElementById('brushToggleBtn');
const brushSettings = document.getElementById('brushSettings');
const brushSizeInput = document.getElementById('brushSize');
const brushSizeValue = document.getElementById('brushSizeValue');
const undoBtn = document.getElementById('undoBtn');

let currentFile = null;
let pngBlob = null;
const MAX_SIZE = 1024; // أقصى تفاصيل ممكنة
let resultBlob = null;
let brushActive = false, isDrawing = false, brushSize = 20;
let ctx = resultCanvas.getContext('2d');
let undoStack = [];

// ---- دوال الرسم ----
function getPos(e) {
    const rect = resultCanvas.getBoundingClientRect();
    const scaleX = resultCanvas.width / rect.width;
    const scaleY = resultCanvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function eraseAt(x, y) {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function startDraw(e) {
    if (!brushActive) return;
    e.preventDefault();
    isDrawing = true;
    const p = getPos(e);
    eraseAt(p.x, p.y);
    setTimeout(saveUndoState, 10);
}

function draw(e) {
    if (!isDrawing || !brushActive) return;
    e.preventDefault();
    const p = getPos(e);
    eraseAt(p.x, p.y);
}

function endDraw() {
    isDrawing = false;
}

function addBrushListeners() {
    resultCanvas.addEventListener('touchstart', startDraw, { passive: false });
    resultCanvas.addEventListener('touchmove', draw, { passive: false });
    resultCanvas.addEventListener('touchend', endDraw);
    resultCanvas.addEventListener('touchcancel', endDraw);
    resultCanvas.addEventListener('mousedown', startDraw);
    resultCanvas.addEventListener('mousemove', draw);
    resultCanvas.addEventListener('mouseup', endDraw);
    resultCanvas.addEventListener('mouseleave', endDraw);
}

function removeBrushListeners() {
    resultCanvas.removeEventListener('touchstart', startDraw);
    resultCanvas.removeEventListener('touchmove', draw);
    resultCanvas.removeEventListener('touchend', endDraw);
    resultCanvas.removeEventListener('touchcancel', endDraw);
    resultCanvas.removeEventListener('mousedown', startDraw);
    resultCanvas.removeEventListener('mousemove', draw);
    resultCanvas.removeEventListener('mouseup', endDraw);
    resultCanvas.removeEventListener('mouseleave', endDraw);
}

// ---- تحويل الصورة إلى PNG بأعلى جودة ----
function convertToPNG(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            let w = img.width, h = img.height;
            if (w > MAX_SIZE || h > MAX_SIZE) {
                if (w > h) {
                    h = Math.round((h / w) * MAX_SIZE);
                    w = MAX_SIZE;
                } else {
                    w = Math.round((w / h) * MAX_SIZE);
                    h = MAX_SIZE;
                }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/png', 1.0);
        };
        img.onerror = () => reject(new Error('load failed'));
        img.src = URL.createObjectURL(file);
    });
}

// ---- رفع صورة ----
fileInput.addEventListener('change', async e => {
    if (!e.target.files[0]) return;
    resetAll();
    const file = e.target.files[0];
    currentFile = file;
    originalImg.src = URL.createObjectURL(file);
    preview.style.display = 'flex';
    removeBtn.disabled = false;
    uploadLabel.querySelector('p').innerText = file.name;
    try {
        pngBlob = await convertToPNG(file);
        showToast('✅ Image uploaded successfully!');
    } catch { alert('Cannot process this image.'); removeBtn.disabled = true; }
});

uploadLabel.addEventListener('dragover', e => { e.preventDefault(); uploadLabel.style.borderColor = '#8b5cf6'; });
uploadLabel.addEventListener('dragleave', () => uploadLabel.style.borderColor = '#333');
uploadLabel.addEventListener('drop', async e => {
    e.preventDefault();
    uploadLabel.style.borderColor = '#333';
    const file = e.dataTransfer.files[0];
    if (!file?.type?.startsWith('image/')) return;
    resetAll();
    currentFile = file;
    originalImg.src = URL.createObjectURL(file);
    preview.style.display = 'flex';
    removeBtn.disabled = false;
    uploadLabel.querySelector('p').innerText = file.name;
    try { pngBlob = await convertToPNG(file); showToast('✅ Image uploaded!'); }
    catch { alert('Cannot process.'); removeBtn.disabled = true; }
});

// ---- تقدم وهمي ----
function startFakeProgress() {
    progressContainer.style.display = 'block';
    progressFill.style.width = '0%';
    progressText.textContent = 'Processing… 0%';
    let percent = 0;
    const interval = setInterval(() => {
        if (percent < 90) {
            percent += 1;
            progressFill.style.width = percent + '%';
            progressText.textContent = 'Processing… ' + percent + '%';
        } else {
            progressFill.style.width = '90%';
            progressText.textContent = 'Processing… 90%';
        }
    }, 300);
    return {
        stop: () => clearInterval(interval),
        complete: () => {
            clearInterval(interval);
            progressFill.style.width = '100%';
            progressText.textContent = 'Done!';
        }
    };
}

// ---- إزالة الخلفية (نموذج isnet_quint8 أولاً، وإلا medium) ----
removeBtn.addEventListener('click', async () => {
    if (!pngBlob) return;
    removeBtn.disabled = true;
    const fake = startFakeProgress();

    try {
        // محاولة استخدام isnet_quint8 (دقة أعلى من medium وأخف من isnet)
        try {
            resultBlob = await removeBackground(pngBlob, { model: 'isnet_quint8' });
        } catch {
            resultBlob = await removeBackground(pngBlob, { model: 'medium' });
        }

        const img = new Image();
        img.onload = () => {
            resultCanvas.width = img.width;
            resultCanvas.height = img.height;
            ctx = resultCanvas.getContext('2d');
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            ctx.drawImage(img, 0, 0);
            brushControls.style.display = 'block';
            downloadBtn.style.display = 'block';
            setTimeout(() => saveUndoState(), 50);
            fake.complete();
            showToast('🎉 Background removed successfully!');
        };
        img.src = URL.createObjectURL(resultBlob);
    } catch (err) {
        alert('Error: ' + err.message);
        progressText.textContent = 'Error';
    } finally {
        removeBtn.disabled = false;
        setTimeout(() => {
            progressContainer.style.display = 'none';
        }, 1500);
    }
});

// ---- فرشاة ----
function enableBrush() {
    brushActive = true;
    brushToggleBtn.textContent = '🖌️ Brush Active (tap to disable)';
    brushSettings.style.display = 'block';
    resultCanvas.classList.add('brushing');
    addBrushListeners();
}

function disableBrush() {
    brushActive = false;
    isDrawing = false;
    brushToggleBtn.textContent = '🖌️ Enable Brush Eraser';
    brushSettings.style.display = 'none';
    resultCanvas.classList.remove('brushing');
    removeBrushListeners();
}

brushToggleBtn.addEventListener('click', () => {
    if (brushActive) disableBrush();
    else enableBrush();
});

brushSizeInput.addEventListener('input', e => {
    brushSize = +e.target.value;
    brushSizeValue.textContent = brushSize;
});

function saveUndoState() {
    if (undoStack.length > 20) undoStack.shift();
    undoStack.push(resultCanvas.toDataURL());
}

undoBtn.addEventListener('click', () => {
    if (undoStack.length > 1) {
        undoStack.pop();
        const prev = undoStack[undoStack.length - 1];
        const img = new Image();
        img.onload = () => {
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = prev;
    }
});

downloadBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = resultCanvas.toDataURL('image/png');
    a.download = 'transparent.png';
    a.click();
});

function resetAll() {
    resultBlob = null;
    disableBrush();
    brushControls.style.display = 'none';
    downloadBtn.style.display = 'none';
    undoStack = [];
    ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
    progressContainer.style.display = 'none';
}
</script>
</body>
</html>
