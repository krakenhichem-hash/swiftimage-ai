<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftImage AI - Free Background Remover</title>
    <meta name="description" content="Remove backgrounds instantly with AI. Free, private, no upload.">
    <style>
        * { box-sizing: border-box; }
        body { background:#080810; color:#fff; font-family:Arial,sans-serif; margin:0; padding:0 15px; }
        header { padding:20px; text-align:center; }
        .hero { text-align:center; padding:40px 0; }
        .hero h1 { font-size:2.5rem; }
        .hero span { color:#8b5cf6; }
        .container { max-width:600px; margin:auto; }

        .upload-area {
            border:2px dashed #333; padding:30px 20px; border-radius:20px;
            background:#12121c; text-align:center; margin:20px 0;
        }
        .upload-area p { margin-bottom:15px; font-size:16px; }
        .upload-area input[type="file"] {
            display:inline-block; background:#222; color:#fff;
            padding:12px 20px; border-radius:10px; border:1px solid #444; cursor:pointer;
        }

        button {
            display:block; width:100%; margin:10px 0; background:#8b5cf6; color:white;
            border:none; padding:16px; border-radius:14px; font-size:18px; cursor:pointer;
        }
        button:disabled { opacity:0.5; }

        .preview-row { display:flex; flex-direction:column; gap:20px; margin:20px 0; }
        .preview-row img, .preview-row canvas { max-width:100%; border-radius:12px; border:1px solid #333; }

        #resultCanvas { pointer-events:none; touch-action:pan-y; }
        #resultCanvas.brushing { pointer-events:auto; touch-action:none; }

        .result-wrapper {
            display:inline-block;
            background-image:
                linear-gradient(45deg, #555 25%, transparent 25%),
                linear-gradient(-45deg, #555 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #555 75%),
                linear-gradient(-45deg, transparent 75%, #555 75%);
            background-size:20px 20px;
            background-position:0 0, 0 10px, 10px -10px, -10px 0px;
            border-radius:12px; padding:2px;
        }
        .result-wrapper canvas { display:block; border-radius:10px; }

        #progress-container { display:none; margin:10px 0; }
        #progress-bar { width:100%; height:8px; background:#222; border-radius:8px; overflow:hidden; }
        #progress-fill { width:0%; height:100%; background:#8b5cf6; border-radius:8px; transition:width 0.3s; }
        #progress-text { text-align:center; font-size:16px; color:#8b5cf6; margin-top:5px; }

        .brush-controls { display:none; margin:10px 0; text-align:center; }
        .brush-controls .mode-btn { display:inline-block; width:auto; padding:10px 18px; margin:5px; border-radius:12px; background:#333; color:#fff; cursor:pointer; border:none; font-size:14px; }
        .brush-controls .mode-btn.active { background:#8b5cf6; }
        .brush-settings { display:none; margin-top:5px; }
        .brush-settings input[type="range"] { width:100%; margin:5px 0; }
        .btn-secondary { background:#333; color:#fff; border:none; cursor:pointer; font-size:14px; padding:10px 16px; margin:4px; border-radius:10px; display:inline-block; width:auto; }
        footer { text-align:center; padding:30px; color:#888; }
        footer a { color:#8b5cf6; margin:0 10px; }

        #toast-container {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            z-index:9999; display:flex; flex-direction:column; align-items:center; gap:10px; pointer-events:none;
        }
        .toast {
            background:#8b5cf6; color:#fff; padding:14px 28px; border-radius:30px;
            font-size:16px; font-weight:bold; box-shadow:0 6px 20px rgba(139,92,246,0.4);
            animation:slideDown 0.4s ease, fadeOut 0.4s 1.6s ease forwards;
            pointer-events:auto; white-space:nowrap;
        }
        @keyframes slideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeOut { to { opacity:0; transform:translateY(-10px); } }

        @media (max-width:400px) { .hero h1 { font-size:2rem; } }
    </style>
</head>
<body>
<div id="toast-container"></div>

<header><h2>SwiftImage AI</h2></header>
<section class="hero">
    <h1><span>Remove Backgrounds</span> Instantly</h1>
    <p>AI runs in your browser. 100% private, no upload.</p>
</section>

<div class="container">
    <!-- منطقة رفع الصورة: input ظاهر مباشرة -->
    <div class="upload-area">
        <p>📁 Select an image to remove its background</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <button id="removeBtn" disabled>🔮 Remove Background</button>

    <div id="progress-container">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="progress-text">Processing… 0%</div>
    </div>

    <div class="preview-row" id="preview" style="display:none;">
        <div><strong>Original</strong><br><img id="originalImg" alt="Original"></div>
        <div>
            <strong>Result (transparent background)</strong><br>
            <div class="result-wrapper">
                <canvas id="resultCanvas" width="800" height="600"></canvas>
            </div>
        </div>
    </div>

    <div class="brush-controls" id="brushControls">
        <button id="eraseModeBtn" class="mode-btn active">🧹 Erase</button>
        <button id="restoreModeBtn" class="mode-btn">🔄 Restore</button>
        <div class="brush-settings" id="brushSettings">
            <label>Brush Size: <span id="brushSizeValue">20</span>px</label>
            <input type="range" id="brushSize" min="5" max="80" value="20">
        </div>
        <button id="undoBtn" class="btn-secondary">↩ Undo</button>
    </div>

    <button id="downloadBtn" style="display:none;">⬇ Download PNG</button>
</div>

<footer>
    <p>
        <a href="/">Home</a> |
        <a href="/privacy.html">Privacy Policy</a> |
        <a href="/contact.html">Contact</a> |
        <a href="/about.html">About</a>
    </p>
    <p>© 2026 SwiftImage AI</p>
</footer>

<!-- ========== رفع الصورة (مستقل، بدون تحقق من النوع) ========== -->
<script>
    const fileInput = document.getElementById('fileInput');
    const originalImg = document.getElementById('originalImg');
    const preview = document.getElementById('preview');
    const removeBtn = document.getElementById('removeBtn');

    window.currentFile = null;

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // عرض الصورة مباشرة دون التحقق من type (بعض الهواتف لا ترسل type صحيح)
        const url = URL.createObjectURL(file);
        originalImg.src = url;
        preview.style.display = 'flex';
        removeBtn.disabled = false;
        window.currentFile = file;

        // إشعار
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = '✅ Image uploaded!';
        document.getElementById('toast-container').appendChild(toast);
        setTimeout(() => toast.remove(), 3000);

        // إعادة تعيين الأدوات السابقة إن وجدت
        if (window.resetAll) window.resetAll();
    });
</script>

<!-- ========== الأدوات (module) ========== -->
<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1/+esm';

// ---- Toast ----
function showToast(msg) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { if (t.parentNode) t.remove(); }, 3000);
}

// ---- DOM ----
const removeBtn = document.getElementById('removeBtn');
const downloadBtn = document.getElementById('downloadBtn');
const resultCanvas = document.getElementById('resultCanvas');
const progressContainer = document.getElementById('progress-container');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const brushControls = document.getElementById('brushControls');
const eraseModeBtn = document.getElementById('eraseModeBtn');
const restoreModeBtn = document.getElementById('restoreModeBtn');
const brushSettings = document.getElementById('brushSettings');
const brushSizeInput = document.getElementById('brushSize');
const brushSizeValue = document.getElementById('brushSizeValue');
const undoBtn = document.getElementById('undoBtn');

let resultBlob = null;
let originalImage = null;
let ctx = resultCanvas.getContext('2d');
let undoStack = [];

let brushActive = false;
let brushMode = 'erase';
let brushSize = 20;
let isDrawing = false;

// ---- دوال الفرشاة والاستعادة ----
function getCanvasCoords(e) {
    const rect = resultCanvas.getBoundingClientRect();
    const scaleX = resultCanvas.width / rect.width;
    const scaleY = resultCanvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function applyBrush(x, y) {
    if (brushMode === 'erase') {
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, brushSize/2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    } else if (brushMode === 'restore' && originalImage) {
        const cw = resultCanvas.width, ch = resultCanvas.height;
        const iw = originalImage.width, ih = originalImage.height;
        const scale = Math.min(cw / iw, ch / ih);
        const srcSize = brushSize / scale;
        const srcX = (x / scale) - srcSize/2;
        const srcY = (y / scale) - srcSize/2;
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(originalImage, srcX, srcY, srcSize, srcSize, x - brushSize/2, y - brushSize/2, brushSize, brushSize);
        ctx.restore();
    }
}

function brushStart(e) {
    if (!brushActive) return;
    e.preventDefault();
    isDrawing = true;
    const p = getCanvasCoords(e);
    applyBrush(p.x, p.y);
    setTimeout(saveUndoState, 10);
}
function brushMove(e) {
    if (!isDrawing || !brushActive) return;
    e.preventDefault();
    const p = getCanvasCoords(e);
    applyBrush(p.x, p.y);
}
function brushEnd() { isDrawing = false; }

function addBrushListeners() {
    resultCanvas.addEventListener('touchstart', brushStart, {passive:false});
    resultCanvas.addEventListener('touchmove', brushMove, {passive:false});
    resultCanvas.addEventListener('touchend', brushEnd);
    resultCanvas.addEventListener('touchcancel', brushEnd);
    resultCanvas.addEventListener('mousedown', brushStart);
    resultCanvas.addEventListener('mousemove', brushMove);
    resultCanvas.addEventListener('mouseup', brushEnd);
    resultCanvas.addEventListener('mouseleave', brushEnd);
}
function removeBrushListeners() {
    resultCanvas.removeEventListener('touchstart', brushStart);
    resultCanvas.removeEventListener('touchmove', brushMove);
    resultCanvas.removeEventListener('touchend', brushEnd);
    resultCanvas.removeEventListener('touchcancel', brushEnd);
    resultCanvas.removeEventListener('mousedown', brushStart);
    resultCanvas.removeEventListener('mousemove', brushMove);
    resultCanvas.removeEventListener('mouseup', brushEnd);
    resultCanvas.removeEventListener('mouseleave', brushEnd);
}

function enableBrush() {
    brushActive = true;
    resultCanvas.classList.add('brushing');
    brushSettings.style.display = 'block';
    addBrushListeners();
}
function disableBrush() {
    brushActive = false;
    isDrawing = false;
    resultCanvas.classList.remove('brushing');
    brushSettings.style.display = 'none';
    removeBrushListeners();
}

// ---- أزرار الأوضاع ----
eraseModeBtn.addEventListener('click', () => {
    if (brushActive && brushMode === 'erase') {
        disableBrush();
        eraseModeBtn.classList.remove('active');
    } else {
        brushMode = 'erase';
        eraseModeBtn.classList.add('active');
        restoreModeBtn.classList.remove('active');
        if (!brushActive) enableBrush();
    }
});
restoreModeBtn.addEventListener('click', () => {
    if (brushActive && brushMode === 'restore') {
        disableBrush();
        restoreModeBtn.classList.remove('active');
    } else {
        brushMode = 'restore';
        restoreModeBtn.classList.add('active');
        eraseModeBtn.classList.remove('active');
        if (!brushActive) enableBrush();
    }
});

brushSizeInput.addEventListener('input', e => {
    brushSize = +e.target.value;
    brushSizeValue.textContent = brushSize;
});

// ---- تقدم وهمي ----
function startFakeProgress() {
    progressContainer.style.display='block'; progressFill.style.width='0%'; progressText.textContent='Processing… 0%';
    let percent=0;
    const interval=setInterval(()=>{
        if(percent<90){ percent+=1; progressFill.style.width=percent+'%'; progressText.textContent='Processing… '+percent+'%'; }
        else { progressFill.style.width='90%'; progressText.textContent='Processing… 90%'; }
    },300);
    return { stop:()=>clearInterval(interval), complete:()=>{ clearInterval(interval); progressFill.style.width='100%'; progressText.textContent='Done!'; } };
}

// ---- تحويل احتياطي إلى PNG ----
async function convertToPNG(file) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const MAX_DIM = 1024;
            let w = img.width, h = img.height;
            if (w > MAX_DIM || h > MAX_DIM) {
                const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
                w = Math.round(w * ratio); h = Math.round(h * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            canvas.toBlob(blob => {
                if (blob) { URL.revokeObjectURL(img.src); resolve(blob); }
                else reject(new Error('Canvas toBlob failed'));
            }, 'image/png', 1.0);
        };
        img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('Cannot decode this image.')); };
        img.src = URL.createObjectURL(file);
    });
}

// ---- إزالة الخلفية ----
removeBtn.addEventListener('click', async () => {
    const file = window.currentFile;
    if (!file) return;
    removeBtn.disabled = true;
    const fake = startFakeProgress();

    try {
        // تحميل الصورة الأصلية للاستعادة
        const orig = new Image();
        orig.src = URL.createObjectURL(file);
        await new Promise((res, rej) => { orig.onload = res; orig.onerror = rej; });
        originalImage = orig;

        // محاولة أولى: مباشر
        try {
            resultBlob = await removeBackground(file, { model: 'medium' });
        } catch (directError) {
            console.warn('Direct failed, trying PNG conversion...');
            const pngBlob = await convertToPNG(file);
            resultBlob = await removeBackground(pngBlob, { model: 'medium' });
        }

        const img = new Image();
        img.onload = () => {
            resultCanvas.width = img.width;
            resultCanvas.height = img.height;
            ctx = resultCanvas.getContext('2d');
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            ctx.drawImage(img, 0, 0);
            brushControls.style.display = 'block';
            downloadBtn.style.display = 'block';
            brushMode = 'erase';
            eraseModeBtn.classList.add('active');
            restoreModeBtn.classList.remove('active');
            disableBrush();
            saveUndoState();
            fake.complete();
            showToast('🎉 Background removed! Use Erase/Restore brush.');
        };
        img.src = URL.createObjectURL(resultBlob);
    } catch (err) {
        console.error('Remove background error:', err);
        alert('Cannot process this image. It may be corrupted or in an unsupported format.');
        progressText.textContent = 'Error';
    } finally {
        removeBtn.disabled = false;
        setTimeout(() => { progressContainer.style.display = 'none'; }, 1500);
    }
});

// ---- Undo ----
function saveUndoState() { if(undoStack.length>20) undoStack.shift(); undoStack.push(resultCanvas.toDataURL()); }
undoBtn.addEventListener('click', ()=>{
    if(undoStack.length>1){
        undoStack.pop();
        const prev=undoStack[undoStack.length-1];
        const img=new Image();
        img.onload=()=>{ ctx.clearRect(0,0,resultCanvas.width,resultCanvas.height); ctx.drawImage(img,0,0); resultCanvas.toBlob(b=>{if(b)resultBlob=b;},'image/png'); };
        img.src=prev;
    }
});
downloadBtn.addEventListener('click', ()=>{
    const a=document.createElement('a');
    a.href=resultCanvas.toDataURL('image/png');
    a.download='transparent.png';
    a.click();
});

window.resetAll = function() {
    resultBlob=null;
    originalImage=null;
    disableBrush();
    brushControls.style.display='none';
    downloadBtn.style.display='none';
    undoStack=[];
    ctx.clearRect(0,0,resultCanvas.width,resultCanvas.height);
    progressContainer.style.display='none';
    eraseModeBtn.classList.add('active');
    restoreModeBtn.classList.remove('active');
};
</script>

</body>
</html>
